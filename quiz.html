<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz — Level Up Africa</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="quiz-container">
        <!-- Header quiz -->
        <header class="quiz-header">
            <button class="btn-icon" onclick="goHome()" title="Retour à l'accueil">🏠</button>
            <div class="quiz-info">
                <span id="themeBadge" class="theme-badge">Thème</span>
                <span id="questionCounter" class="question-counter">Question 1 / 10</span>
            </div>
            <div class="timer-container">
                <span id="timer" class="timer">20</span>
                <span class="timer-label">s</span>
            </div>
        </header>

        <!-- Barre de progression -->
        <div class="progress-bar-container">
            <div id="progressBar" class="progress-bar"></div>
        </div>

        <!-- Zone de chargement -->
        <div id="loadingScreen" class="loading-screen">
            <div class="spinner"></div>
            <p>Chargement des questions...</p>
        </div>

        <!-- Zone du quiz -->
        <div id="quizScreen" class="quiz-screen" style="display:none;">
            <div class="question-card">
                <h2 id="questionText" class="question-text">Question ici</h2>
            </div>
            <div id="optionsContainer" class="options-container">
                <!-- Options générées dynamiquement -->
            </div>
            <div id="feedback" class="feedback" style="display:none;">
                <p id="feedbackText"></p>
                <button class="btn-next" onclick="nextQuestion()">Suivant →</button>
            </div>
        </div>

        <!-- Score en temps réel -->
        <div id="scoreDisplay" class="score-display">
            Score : <span id="scoreValue">0</span> pts
        </div>

        <!-- Écran de résultats -->
        <div id="resultsScreen" class="results-screen" style="display:none;">
            <div class="results-card">
                <div class="results-icon">🏆</div>
                <h2 class="results-title">Quiz terminé !</h2>
                <div class="final-score">
                    <span id="finalScoreValue" class="final-score-value">0</span>
                    <span class="final-score-total">/ <span id="finalScoreTotal">10</span></span>
                </div>
                <p id="resultsMessage" class="results-message"></p>
                <div class="results-stats">
                    <div class="stat">
                        <span class="stat-value" id="statCorrect">0</span>
                        <span class="stat-label">✅ Correctes</span>
                    </div>
                    <div class="stat">
                        <span class="stat-value" id="statWrong">0</span>
                        <span class="stat-label">❌ Incorrectes</span>
                    </div>
                    <div class="stat">
                        <span class="stat-value" id="statTime">0</span>
                        <span class="stat-label">⏱️ Temps total</span>
                    </div>
                </div>
                <div class="results-actions">
                    <button class="btn-replay" onclick="replayQuiz()">🔄 Rejouer</button>
                    <button class="btn-home" onclick="goHome()">🏠 Accueil</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/quiz.js"></script>
</body>
</html>
